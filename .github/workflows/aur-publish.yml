name: Publish to AUR

on:
  push:
    branches:
      - main
    paths:
      - .gitignore
      - .github/workflows/aur-publish.yml
      - .SRCINFO
      - LICENSE
      - PKGBUILD
      - README.md
      - REUSE.toml
      - uuyc-wine
      - uuyc-wine.desktop
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: aur-publish-uuyc-wine
  cancel-in-progress: false

jobs:
  publish:
    name: Publish verified package recipe
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@da03e160361ce01bf087e790b6ffd196d7dccff7 # v4.1.3
        with:
          pkgname: uuyc-wine
          pkgbuild: ./PKGBUILD
          assets: |
            .gitignore
            LICENSE
            README.md
            REUSE.toml
            uuyc-wine
            uuyc-wine.desktop
          post_process: git add --chmod=+x uuyc-wine
          commit_username: ParticleG
          commit_email: particle_g@outlook.com
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Sync from GitHub: ${{ github.sha }}"
